  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"4caeff20-a23a-41a1-953f-6ab44c34ecb4\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>\n  body { margin: 0; background: #f4f4f4; }\n  * { box-sizing: border-box; }\n  input::placeholder { color: #767676; }\n  @media (max-width: 900px){\n    [data-rs=\"grid3\"]{ grid-template-columns: 1fr 1fr !important; }\n  }\n  @media (max-width: 640px){\n    [data-rs=\"page\"]{ padding: 16px !important; }\n    [data-rs=\"bar\"]{ padding-left: 16px !important; padding-right: 16px !important; }\n    [data-rs=\"content\"]{ padding: 16px !important; }\n    [data-rs=\"card\"], [data-rs=\"well\"]{ padding: 16px !important; }\n    [data-rs=\"grid2\"], [data-rs=\"grid3\"]{ grid-template-columns: 1fr !important; }\n    [data-rs=\"rhead\"]{ display: none !important; }\n    [data-rs=\"row\"]{ grid-template-columns: 1fr !important; gap: 10px !important; }\n    [data-rs=\"tabs\"]{ flex-wrap: wrap !important; }\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div data-rs=\"page\" style=\"font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #1a1a1a; padding: 32px; min-height: 100vh;\">\n  <div style=\"max-width: 920px; margin: 0 auto;\">\n    <div style=\"font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; color: #767676; margin-bottom: 12px; font-weight: 600;\">Mid-fidelity replica · functional prototype<\u002Fdiv>\n\n    <div style=\"border: 1px solid #111; background: #fff;\">\n      <!-- App header -->\n      <div data-rs=\"bar\" style=\"background: #e7e7e7; border-bottom: 1px solid #111; padding: 18px 28px;\">\n        <div style=\"font-size: 21px; font-weight: 700;\">Canadian Fisheries Information System<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-rs=\"content\" style=\"padding: 28px;\">\n        <h2 style=\"font-size: 26px; font-weight: 700; margin: 0;\">Permanent quota transfer<\u002Fh2>\n        <div style=\"font-size: 14px; color: #595959; margin-top: 4px;\">Step 2 of 5<\u002Fdiv>\n        <h3 style=\"font-size: 21px; font-weight: 700; margin: 12px 0 0;\">Search and select recipient(s)<\u002Fh3>\n        <p style=\"font-size: 15px; color: #333; margin: 8px 0 18px;\">Enter at least 1 parameter to filter search results.<\u002Fp>\n\n        <sc-if value=\"{{ hasError }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"border: 1px solid #b32d2d; border-left: 5px solid #b32d2d; background: #fbeaea; padding: 12px 16px; margin-bottom: 18px; font-size: 15px; color: #6b1717; font-weight: 600;\">{{ formError }}<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- Search parameters card -->\n        <div data-rs=\"card\" style=\"border: 1px solid #595959; border-radius: 4px; padding: 22px 24px;\">\n          <div style=\"font-size: 19px; font-weight: 700; margin-bottom: 16px;\">Search parameters<\u002Fdiv>\n          <div data-rs=\"well\" style=\"background: #f7f7f7; border: 1px solid #e2e2e2; border-radius: 4px; padding: 20px;\">\n            <div style=\"font-size: 16px; font-weight: 700; color: #333; margin-bottom: 14px;\">Licence details<\u002Fdiv>\n            <div data-rs=\"grid2\" style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px 24px; margin-bottom: 16px;\">\n              <div>\n                <label style=\"display: block; font-size: 14px; font-weight: 700; color: #333; margin-bottom: 6px;\">Licence number<\u002Flabel>\n                <input type=\"text\" value=\"{{ fLicence }}\" onchange=\"{{ onLicence }}\" style=\"width: 100%; padding: 9px 10px; font-size: 15px; border: 1px solid #767676; border-radius: 4px; background: #fff; font-family: inherit; color: #1a1a1a;\">\n              <\u002Fdiv>\n              <div>\n                <label style=\"display: block; font-size: 14px; font-weight: 700; color: #333; margin-bottom: 6px;\">Species<\u002Flabel>\n                <select value=\"{{ fSpecies }}\" onchange=\"{{ onSpecies }}\" style=\"width: 100%; padding: 9px 10px; font-size: 15px; border: 1px solid #767676; border-radius: 4px; background: #fff; font-family: inherit; color: #1a1a1a;\">\n                  <option value=\"\">Select<\u002Foption>\n                  <sc-for list=\"{{ speciesOptions }}\" as=\"sp\" hint-placeholder-count=\"3\"><option value=\"{{ sp }}\">{{ sp }}<\u002Foption><\u002Fsc-for>\n                <\u002Fselect>\n              <\u002Fdiv>\n              <div>\n                <label style=\"display: block; font-size: 14px; font-weight: 700; color: #333; margin-bottom: 6px;\">Licence program name<\u002Flabel>\n                <input type=\"text\" value=\"{{ fProgName }}\" onchange=\"{{ onProgName }}\" style=\"width: 100%; padding: 9px 10px; font-size: 15px; border: 1px solid #767676; border-radius: 4px; background: #fff; font-family: inherit; color: #1a1a1a;\">\n              <\u002Fdiv>\n              <div>\n                <label style=\"display: block; font-size: 14px; font-weight: 700; color: #333; margin-bottom: 6px;\">Licence program number<\u002Flabel>\n                <input type=\"text\" value=\"{{ fProgNum }}\" onchange=\"{{ onProgNum }}\" style=\"width: 100%; padding: 9px 10px; font-size: 15px; border: 1px solid #767676; border-radius: 4px; background: #fff; font-family: inherit; color: #1a1a1a;\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border-top: 1px solid #e0e0e0; margin: 18px 0;\"><\u002Fdiv>\n            <div style=\"font-size: 16px; font-weight: 700; color: #333; margin-bottom: 14px;\">Licence holder details<\u002Fdiv>\n            <div data-rs=\"grid3\" style=\"display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px 24px; margin-bottom: 16px;\">\n              <div>\n                <label style=\"display: block; font-size: 14px; font-weight: 700; color: #333; margin-bottom: 6px;\">Last name<\u002Flabel>\n                <input type=\"text\" value=\"{{ fLast }}\" onchange=\"{{ onLast }}\" style=\"width: 100%; padding: 9px 10px; font-size: 15px; border: 1px solid #767676; border-radius: 4px; background: #fff; font-family: inherit; color: #1a1a1a;\">\n              <\u002Fdiv>\n              <div>\n                <label style=\"display: block; font-size: 14px; font-weight: 700; color: #333; margin-bottom: 6px;\">First name<\u002Flabel>\n                <input type=\"text\" value=\"{{ fFirst }}\" onchange=\"{{ onFirst }}\" style=\"width: 100%; padding: 9px 10px; font-size: 15px; border: 1px solid #767676; border-radius: 4px; background: #fff; font-family: inherit; color: #1a1a1a;\">\n              <\u002Fdiv>\n              <div>\n                <label style=\"display: block; font-size: 14px; font-weight: 700; color: #333; margin-bottom: 6px;\">Date of birth<\u002Flabel>\n                <div style=\"position: relative;\">\n                  <input type=\"text\" placeholder=\"mm/dd/yyyy\" value=\"{{ fDob }}\" onchange=\"{{ onDob }}\" style=\"width: 100%; padding: 9px 32px 9px 10px; font-size: 15px; border: 1px solid #767676; border-radius: 4px; background: #fff; font-family: inherit; color: #1a1a1a;\">\n                  <span style=\"position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #595959; font-size: 15px;\">📅<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div data-rs=\"grid2\" style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px 24px;\">\n              <div>\n                <label style=\"display: block; font-size: 14px; font-weight: 700; color: #333; margin-bottom: 6px;\">Organization/Company name<\u002Flabel>\n                <input type=\"text\" value=\"{{ fOrg }}\" onchange=\"{{ onOrg }}\" style=\"width: 100%; padding: 9px 10px; font-size: 15px; border: 1px solid #767676; border-radius: 4px; background: #fff; font-family: inherit; color: #1a1a1a;\">\n              <\u002Fdiv>\n              <div>\n                <label style=\"display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 700; color: #333; margin-bottom: 6px;\">FIN <span title=\"Fisher Identification Number\" style=\"display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; background: #2a7de1; color: #fff; font-size: 11px; font-style: italic; font-weight: 700;\">i<\u002Fspan><\u002Flabel>\n                <input type=\"text\" value=\"{{ fFin }}\" onchange=\"{{ onFin }}\" style=\"width: 100%; padding: 9px 10px; font-size: 15px; border: 1px solid #767676; border-radius: 4px; background: #fff; font-family: inherit; color: #1a1a1a;\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; gap: 12px; margin-top: 18px;\">\n            <button onclick=\"{{ search }}\" style=\"padding: 11px 20px; background: #595959; color: #fff; border: 1px solid #595959; border-radius: 4px; font-size: 15px; cursor: pointer; font-family: inherit;\">Search<\u002Fbutton>\n            <button onclick=\"{{ clearSearch }}\" style=\"padding: 11px 20px; background: #fff; color: #1a1a1a; border: 1px solid #767676; border-radius: 4px; font-size: 15px; cursor: pointer; font-family: inherit;\">Clear search<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Tabs -->\n        <div data-rs=\"tabs\" style=\"display: flex; gap: 0; margin-top: 28px;\">\n          <button onclick=\"{{ showResults }}\" style=\"{{ tabResStyle }}\">Search results<\u002Fbutton>\n          <button onclick=\"{{ showSelected }}\" style=\"{{ tabSelStyle }}\">{{ tabSelectedLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"border-bottom: 1px solid #c4c4c4; margin-bottom: 22px;\"><\u002Fdiv>\n\n        <!-- SEARCH RESULTS TAB -->\n        <sc-if value=\"{{ isResults }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <h3 style=\"font-size: 21px; font-weight: 700; margin: 0 0 8px;\">Search results<\u002Fh3>\n            <sc-if value=\"{{ noSearch }}\" hint-placeholder-val=\"{{ false }}\">\n              <p style=\"font-size: 15px; color: #333; margin: 6px 0 0;\">Search results will appear here. Perform a search to view results.<\u002Fp>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ emptyResults }}\" hint-placeholder-val=\"{{ false }}\">\n              <p style=\"font-size: 15px; color: #333; margin: 6px 0 0;\">No recipients match your search. Adjust your parameters and try again.<\u002Fp>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ hasResults }}\" hint-placeholder-val=\"{{ true }}\">\n              <div>\n                <p style=\"font-size: 15px; color: #333; margin: 6px 0 16px;\">Select 1 or more recipients that will receive quota, then click \"Next\".<\u002Fp>\n                <sc-if value=\"{{ hasSelected }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display: flex; align-items: center; gap: 16px; margin-bottom: 14px;\">\n                    <span style=\"font-size: 15px; font-weight: 700;\">{{ selCountLabel }}<\u002Fspan>\n                    <button onclick=\"{{ clearAll }}\" style=\"background: none; border: none; padding: 0; color: #1a55b3; text-decoration: underline; font-size: 15px; cursor: pointer; font-family: inherit;\">Clear all<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <div style=\"display: flex; align-items: center; gap: 12px; margin-bottom: 16px;\">\n                  <span style=\"font-size: 15px;\">Rows<\u002Fspan>\n                  <select value=\"{{ rows }}\" onchange=\"{{ onRows }}\" style=\"padding: 6px 8px; font-size: 15px; border: 1px solid #767676; border-radius: 4px; background: #fff; font-family: inherit;\">\n                    <option value=\"5\">5<\u002Foption><option value=\"10\">10<\u002Foption><option value=\"25\">25<\u002Foption>\n                  <\u002Fselect>\n                  <span style=\"font-size: 15px; color: #333;\">{{ showingResults }}<\u002Fspan>\n                <\u002Fdiv>\n                <div data-rs=\"rhead\" style=\"display: grid; grid-template-columns: 1.2fr 1.4fr 1fr; gap: 24px; padding: 0 16px 10px 56px; font-size: 14px; font-weight: 700; color: #333;\">\n                  <div>Full name<\u002Fdiv><div>Licence and holder details<\u002Fdiv><div>Quota details<\u002Fdiv>\n                <\u002Fdiv>\n                <sc-for list=\"{{ resultRows }}\" as=\"row\" hint-placeholder-count=\"3\">\n                  <div data-rs=\"row\" style=\"{{ row.rowStyle }}\">\n                    <div style=\"display: flex; gap: 16px; align-items: flex-start;\">\n                      <input type=\"checkbox\" checked=\"{{ row.checked }}\" onchange=\"{{ row.toggle }}\" aria-label=\"Select recipient\" style=\"width: 26px; height: 26px; flex: none; margin-top: 2px; accent-color: #1a1a1a; cursor: pointer;\">\n                      <div style=\"font-size: 15px; font-weight: 700; padding-top: 4px;\">{{ row.name }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <ul style=\"margin: 0; padding-left: 18px; font-size: 15px; line-height: 1.6;\">\n                      <sc-for list=\"{{ row.holder }}\" as=\"d\" hint-placeholder-count=\"4\"><li>{{ d }}<\u002Fli><\u002Fsc-for>\n                    <\u002Ful>\n                    <ul style=\"margin: 0; padding-left: 18px; font-size: 15px; line-height: 1.6;\">\n                      <sc-for list=\"{{ row.quota }}\" as=\"q\" hint-placeholder-count=\"2\"><li>{{ q }}<\u002Fli><\u002Fsc-for>\n                    <\u002Ful>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- SELECTED RECIPIENTS TAB -->\n        <sc-if value=\"{{ isSelected }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <h3 style=\"font-size: 21px; font-weight: 700; margin: 0 0 8px;\">Selected recipients<\u002Fh3>\n            <p style=\"font-size: 15px; color: #333; margin: 6px 0 16px;\">Total recipients selected across your searches.<\u002Fp>\n            <sc-if value=\"{{ selectedEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n              <p style=\"font-size: 15px; color: #333; margin: 6px 0 0;\">No recipients selected yet. Select recipients from the search results to view them here.<\u002Fp>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ hasSelected }}\" hint-placeholder-val=\"{{ false }}\">\n              <div>\n                <div style=\"display: flex; align-items: center; gap: 16px; margin-bottom: 14px;\">\n                  <span style=\"font-size: 15px; font-weight: 700;\">{{ selCountLabel }}<\u002Fspan>\n                  <button onclick=\"{{ clearAll }}\" style=\"background: none; border: none; padding: 0; color: #1a55b3; text-decoration: underline; font-size: 15px; cursor: pointer; font-family: inherit;\">Clear all<\u002Fbutton>\n                <\u002Fdiv>\n                <div style=\"display: flex; align-items: center; gap: 12px; margin-bottom: 16px;\">\n                  <span style=\"font-size: 15px;\">Rows<\u002Fspan>\n                  <select value=\"{{ rows }}\" onchange=\"{{ onRows }}\" style=\"padding: 6px 8px; font-size: 15px; border: 1px solid #767676; border-radius: 4px; background: #fff; font-family: inherit;\">\n                    <option value=\"5\">5<\u002Foption><option value=\"10\">10<\u002Foption><option value=\"25\">25<\u002Foption>\n                  <\u002Fselect>\n                  <span style=\"font-size: 15px; color: #333;\">{{ showingSelected }}<\u002Fspan>\n                <\u002Fdiv>\n                <div data-rs=\"rhead\" style=\"display: grid; grid-template-columns: 1.2fr 1.4fr 1fr; gap: 24px; padding: 0 16px 10px 56px; font-size: 14px; font-weight: 700; color: #333;\">\n                  <div>Full name<\u002Fdiv><div>Licence and holder details<\u002Fdiv><div>Quota details<\u002Fdiv>\n                <\u002Fdiv>\n                <sc-for list=\"{{ selectedRows }}\" as=\"row\" hint-placeholder-count=\"2\">\n                  <div data-rs=\"row\" style=\"{{ row.rowStyle }}\">\n                    <div style=\"display: flex; gap: 16px; align-items: flex-start;\">\n                      <input type=\"checkbox\" checked=\"{{ row.checked }}\" onchange=\"{{ row.toggle }}\" aria-label=\"Remove recipient\" style=\"width: 26px; height: 26px; flex: none; margin-top: 2px; accent-color: #1a1a1a; cursor: pointer;\">\n                      <div style=\"font-size: 15px; font-weight: 700; padding-top: 4px;\">{{ row.name }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <ul style=\"margin: 0; padding-left: 18px; font-size: 15px; line-height: 1.6;\">\n                      <sc-for list=\"{{ row.holder }}\" as=\"d\" hint-placeholder-count=\"4\"><li>{{ d }}<\u002Fli><\u002Fsc-for>\n                    <\u002Ful>\n                    <ul style=\"margin: 0; padding-left: 18px; font-size: 15px; line-height: 1.6;\">\n                      <sc-for list=\"{{ row.quota }}\" as=\"q\" hint-placeholder-count=\"2\"><li>{{ q }}<\u002Fli><\u002Fsc-for>\n                    <\u002Ful>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- Footer wizard nav -->\n        <div style=\"display: flex; gap: 12px; margin-top: 36px;\">\n          <button style=\"padding: 11px 22px; background: #fff; color: #1a1a1a; border: 1px solid #767676; border-radius: 4px; font-size: 15px; cursor: pointer; font-family: inherit;\">Previous<\u002Fbutton>\n          <button style=\"padding: 11px 22px; background: #595959; color: #fff; border: 1px solid #595959; border-radius: 4px; font-size: 15px; cursor: pointer; font-family: inherit;\">Next<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div aria-live=\"polite\" role=\"status\" style=\"position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap;\">{{ live }}<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst POOL = [\n  { id:'r1', first:'Avery', last:'MacKenzie', name:'Avery MacKenzie', lic:'10060010', fin:'F8821', species:'Lobster', dob:'03/12/1984', org:'', quota:'45,000 lb', area:'LFA 34' },\n  { id:'r2', first:'Jean-Luc', last:'Bouchard', name:'Jean-Luc Bouchard', lic:'10060011', fin:'F5527', species:'Snow crab', dob:'11/02/1979', org:'Bouchard Fisheries Ltd.', quota:'88,000 lb', area:'Area 12' },\n  { id:'r3', first:'Maria', last:'Santos', name:'Maria Santos', lic:'10060012', fin:'F3340', species:'Halibut', dob:'06/21/1990', org:'', quota:'21,500 lb', area:'4VWX' },\n  { id:'r4', first:'Thomas', last:'Nguyen', name:'Thomas Nguyen', lic:'184658050001', fin:'F9102', species:'Herring', dob:'01/30/1972', org:'', quota:'310 t', area:'4WX' },\n  { id:'r5', first:'Elise', last:'Gagnon', name:'Elise Gagnon', lic:'184658050002', fin:'F7765', species:'Scallop', dob:'09/14/1988', org:'Gagnon Seafood Co.', quota:'15,000 lb', area:'SFA 29' },\n  { id:'r6', first:'Robert', last:'Singh', name:'Robert Singh', lic:'184658050003', fin:'F2218', species:'Snow crab', dob:'04/08/1981', org:'', quota:'67,000 lb', area:'Area 19' },\n  { id:'r7', first:'Linda', last:'Chiasson', name:'Linda Chiasson', lic:'22001450', fin:'F4490', species:'Lobster', dob:'07/19/1969', org:'', quota:'39,000 lb', area:'LFA 25' },\n  { id:'r8', first:'Marc', last:'Doucet', name:'Marc Doucet', lic:'22001451', fin:'F6731', species:'Mackerel', dob:'12/03/1995', org:'Doucet & Sons', quota:'50 t', area:'Area 16' }\n];\nconst FIELDS = ['licenceNumber','species','programName','programNumber','lastName','firstName','dob','org','fin'];\n\nclass Component extends DCLogic {\n  state = {\n    form: { licenceNumber:'1006001', species:'', programName:'', programNumber:'', lastName:'', firstName:'', dob:'', org:'', fin:'' },\n    searched: true,\n    results: ['r1','r2','r3'],\n    selected: [],\n    activeTab: 'results',\n    rows: 5,\n    formError: '',\n    live: ''\n  };\n\n  hasAnyParam(f){ return FIELDS.some(k => String(f[k]||'').trim() !== ''); }\n\n  runFilter(f){\n    const ln = (f.licenceNumber||'').trim();\n    const lo = s => String(s||'').toLowerCase();\n    return POOL.filter(r => {\n      if (ln && !r.lic.startsWith(ln)) return false;\n      if (f.species && r.species !== f.species) return false;\n      if (f.lastName.trim() && !lo(r.last).includes(lo(f.lastName).trim())) return false;\n      if (f.firstName.trim() && !lo(r.first).includes(lo(f.firstName).trim())) return false;\n      if (f.fin.trim() && !lo(r.fin).includes(lo(f.fin).trim())) return false;\n      if (f.org.trim() && !lo(r.org).includes(lo(f.org).trim())) return false;\n      if (f.dob.trim() && r.dob !== f.dob.trim()) return false;\n      return true;\n    }).map(r => r.id);\n  }\n\n  setField(k,v){ this.setState(s => ({ form:{ ...s.form, [k]:v }, formError:'' })); }\n\n  doSearch(){\n    this.setState(s => {\n      if (!this.hasAnyParam(s.form)) return { formError:'Enter at least 1 parameter to filter search results.' };\n      const results = this.runFilter(s.form);\n      return { results, searched:true, activeTab:'results', formError:'', live: results.length + ' result' + (results.length===1?'':'s') + ' found.' };\n    });\n  }\n\n  clearSearch(){\n    this.setState({ form:{ licenceNumber:'', species:'', programName:'', programNumber:'', lastName:'', firstName:'', dob:'', org:'', fin:'' }, results:[], searched:false, formError:'', live:'Search cleared.' });\n  }\n\n  toggleSelect(id){\n    this.setState(s => {\n      const has = s.selected.includes(id);\n      const selected = has ? s.selected.filter(x => x !== id) : [...s.selected, id];\n      const r = POOL.find(p => p.id === id);\n      return { selected, live: r.name + (has ? ' removed.' : ' added.') + ' ' + selected.length + ' recipient' + (selected.length===1?'':'s') + ' selected.' };\n    });\n  }\n\n  clearAll(){\n    if (this.state.selected.length === 0) return;\n    if (window.confirm('Remove all selected recipients? This clears every recipient you have selected across your searches.')) {\n      this.setState({ selected:[], live:'All selected recipients removed.' });\n    }\n  }\n\n  setTab(t){ this.setState({ activeTab:t }); }\n  setRows(v){ this.setState({ rows:Number(v) }); }\n\n  renderVals(){\n    const s = this.state;\n    const f = s.form;\n    const setF = k => e => this.setField(k, e.target.value);\n    const byId = id => POOL.find(p => p.id === id);\n    const mk = (r, i) => ({\n      id: r.id,\n      name: r.name,\n      checked: s.selected.includes(r.id),\n      toggle: () => this.toggleSelect(r.id),\n      holder: ['Licence number: ' + r.lic, 'FIN: ' + r.fin, 'Species: ' + r.species, 'Date of birth: ' + r.dob],\n      quota: ['Current quota: ' + r.quota, 'Quota area: ' + r.area],\n      rowStyle: 'display:grid; grid-template-columns:1.2fr 1.4fr 1fr; gap:24px; align-items:start; padding:18px 16px; margin-bottom:6px;' + (i % 2 === 0 ? 'background:#d9d9d9;' : 'background:#fff;')\n    });\n    const allResults = s.results.map(byId).filter(Boolean);\n    const resultRows = allResults.slice(0, s.rows).map(mk);\n    const selectedAll = s.selected.map(byId).filter(Boolean);\n    const selectedRows = selectedAll.slice(0, s.rows).map(mk);\n    const total = allResults.length;\n    const selTotal = selectedAll.length;\n\n    const tabBase = 'padding:12px 22px; font-size:16px; border:1px solid #767676; cursor:pointer; font-family:inherit; margin-bottom:-1px;';\n    const tabActive = tabBase + ' background:#e0e0e0; font-weight:700; border-bottom:3px solid #1a1a1a;';\n    const tabIdle = tabBase + ' background:#fff; font-weight:400; border-bottom:1px solid #767676;';\n\n    return {\n      fLicence: f.licenceNumber, onLicence: setF('licenceNumber'),\n      fSpecies: f.species, onSpecies: setF('species'),\n      fProgName: f.programName, onProgName: setF('programName'),\n      fProgNum: f.programNumber, onProgNum: setF('programNumber'),\n      fLast: f.lastName, onLast: setF('lastName'),\n      fFirst: f.firstName, onFirst: setF('firstName'),\n      fDob: f.dob, onDob: setF('dob'),\n      fOrg: f.org, onOrg: setF('org'),\n      fFin: f.fin, onFin: setF('fin'),\n      speciesOptions: ['Lobster','Snow crab','Halibut','Herring','Scallop','Mackerel'],\n      search: () => this.doSearch(),\n      clearSearch: () => this.clearSearch(),\n      clearAll: () => this.clearAll(),\n      formError: s.formError,\n      hasError: !!s.formError,\n      isResults: s.activeTab === 'results',\n      isSelected: s.activeTab === 'selected',\n      showResults: () => this.setTab('results'),\n      showSelected: () => this.setTab('selected'),\n      tabSelectedLabel: 'Selected recipients (' + selTotal + ')',\n      tabResStyle: s.activeTab === 'results' ? tabActive : tabIdle,\n      tabSelStyle: s.activeTab === 'selected' ? tabActive : tabIdle,\n      resultRows, selectedRows,\n      noSearch: !s.searched,\n      hasResults: s.searched && total > 0,\n      emptyResults: s.searched && total === 0,\n      showingResults: total === 0 ? 'No rows to show' : ('Showing 1 to ' + Math.min(s.rows, total) + ' of ' + total + ' rows'),\n      showingSelected: selTotal === 0 ? 'No rows to show' : ('Showing 1 to ' + Math.min(s.rows, selTotal) + ' of ' + selTotal + ' rows'),\n      selCountLabel: selTotal + ' recipient' + (selTotal===1?'':'s') + ' selected',\n      hasSelected: selTotal > 0,\n      selectedEmpty: selTotal === 0,\n      rows: s.rows,\n      onRows: e => this.setRows(e.target.value),\n      live: s.live\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
